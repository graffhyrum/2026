{% extends "main.html" %}
<!-- Remove side nav bar on large screens on desktop -->
{% block header %}
  {{ super() }}

  <!-- Additional styles for landing page -->
  <style>

    /* Hide table of contents */
    @media screen and (min-width: 60em) {
      .md-sidebar--secondary {
        display: none;
      }
    }

    /* Hide navigation */
    @media screen and (min-width: 76.25em) {
      .md-sidebar--primary {
        display: none;
      }
    }
</style>
{% endblock %}
{% block hero %}
<div class="pytx-hero pytx-container">
  <div class="pytx-hero__image hide-if-dark">
    <img src="assets/images/logos/pytexas2026_bw.png" alt="PyTexas 2026 Logo"/>
    <!--
    <div class="pytx-hero__content">
      <a href="https://pretix.eu/pytexas/2026/" class="pytx-button pytx-button--primary">
       Purchase Your Ticket
      </a>
    </div>
    -->
  </div>
  <div class="pytx-hero__image hide-if-light">
    <img src="assets/images/logos/pytexas2026_color.png" alt="PyTexas 2026 Logo"/>
  </div>
</div>
{% endblock %}
{% block content %}
    <div style="text-align: center;">
        {% include "partials/content.html" %}
    </div>
{% endblock %}
